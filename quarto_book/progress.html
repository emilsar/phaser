<style>
/* ── Quiz feedback ─────────────────────────────────────────────────── */
.quiz-feedback {
  display: none;
  padding: 10px 12px;
  margin-top: 10px;
  border-left: 4px solid;
  border-radius: 4px;
  font-size: 0.9rem;
  line-height: 1.5;
}
.quiz-feedback.correct   { background: #d4edda; border-left-color: #28a745; color: #155724; }
.quiz-feedback.incorrect { background: #f8d7da; border-left-color: #dc3545; color: #721c24; }
.quiz-feedback.warning   { background: #fff3cd; border-left-color: #ffc107; color: #856404; }
body.quarto-dark .quiz-feedback.correct   { background: rgba(40,167,69,0.18);  color: #a8d4a8; }
body.quarto-dark .quiz-feedback.incorrect { background: rgba(220,53,69,0.18);  color: #e8a8a8; }
body.quarto-dark .quiz-feedback.warning   { background: rgba(255,193,7,0.14);  color: #e8d0a0; }
.quiz-feedback code { background: rgba(0,0,0,0.08); padding: 1px 4px; border-radius: 3px; }
body.quarto-dark .quiz-feedback code { background: rgba(0,0,0,0.35); color: inherit; }

.quiz-choices label { padding: 2px 0; margin-left: 4px; cursor: pointer; }
.quiz-choices input[type="radio"] { margin-right: 4px; cursor: pointer; }
.check-btn {
  margin-top: 6px; padding: 5px 14px;
  background: #2780e3; color: #fff;
  border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem;
}
.check-btn:hover { background: #1e6fcb; }
body.quarto-dark .check-btn { background: #00bc8c; color: #1a1a1a; }
body.quarto-dark .check-btn:hover { background: #02a37c; }

/* ── Floating progress widget ───────────────────────────────────────── */
.phaser-progress {
  position: fixed; bottom: 20px; right: 20px; z-index: 1000;
  font-family: system-ui, -apple-system, sans-serif; font-size: 0.85rem;
  background: var(--bs-body-bg, #fff);
  border: 1px solid var(--bs-border-color, #dee2e6);
  border-radius: 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  max-width: 340px; min-width: 220px; overflow: hidden;
}
body.quarto-dark .phaser-progress {
  background: #2a2d38; border-color: #3e4150;
  box-shadow: 0 2px 14px rgba(0,0,0,0.55);
}
.phaser-progress-toggle {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; padding: 10px 14px;
  background: none; border: none; width: 100%;
  text-align: left; color: var(--bs-body-color, #212529);
  cursor: pointer; font-size: 0.85rem;
}
body.quarto-dark .phaser-progress-toggle { color: #dee2e6; }
.phaser-progress-toggle:hover           { background: rgba(0,0,0,0.03); }
body.quarto-dark .phaser-progress-toggle:hover { background: rgba(255,255,255,0.05); }
.phaser-progress-count { font-weight: 600; }
.phaser-progress-body {
  border-top: 1px solid var(--bs-border-color, #dee2e6);
  padding: 12px 14px;
}
body.quarto-dark .phaser-progress-body { border-top-color: #3e4150; }
.phaser-progress-title {
  font-weight: 600; font-size: 0.78rem; text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 8px; color: var(--bs-secondary-color, #6c757d);
}
.phaser-progress-bar {
  height: 6px; background: var(--bs-secondary-bg, #e9ecef);
  border-radius: 3px; margin-bottom: 10px; overflow: hidden;
}
body.quarto-dark .phaser-progress-bar { background: #3e4150; }
.phaser-progress-bar-inner { height: 100%; background: #2780e3; transition: width 0.3s; }
body.quarto-dark .phaser-progress-bar-inner { background: #00bc8c; }
.phaser-progress-list {
  max-height: 320px; overflow-y: auto; margin-bottom: 10px;
}
.progress-item {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0; font-size: 0.82rem;
}
.progress-item-icon { flex-shrink: 0; width: 14px; text-align: center; font-weight: 600; }
.progress-item-icon.correct    { color: #28a745; }
.progress-item-icon.incorrect  { color: #dc3545; }
.progress-item-icon.unanswered { color: #aaa; }
.progress-item-name a {
  color: inherit; text-decoration: none;
  border-bottom: 1px dotted currentColor;
}
.progress-item-name a:hover { border-bottom-style: solid; }
.progress-reset {
  display: block; width: 100%; padding: 4px 8px; font-size: 0.75rem;
  background: none; color: var(--bs-secondary-color, #6c757d);
  border: 1px solid var(--bs-border-color, #dee2e6);
  border-radius: 4px; cursor: pointer;
}
body.quarto-dark .progress-reset { color: #aaa; border-color: #3e4150; }
.progress-reset:hover          { background: rgba(0,0,0,0.04); color: var(--bs-body-color, #212529); }
body.quarto-dark .progress-reset:hover { background: rgba(255,255,255,0.05); color: #dee2e6; }

@media (max-width: 600px) {
  .phaser-progress { bottom: 8px; right: 8px; left: 8px; max-width: none; }
}
</style>

<script>
(function () {
  if (!window.CHAPTER_QUIZZES || window.CHAPTER_QUIZZES.length === 0) return;

  var PREFIX = 'phaser_quiz_';

  function getStatus(id) { return localStorage.getItem(PREFIX + id) || null; }
  function setStatus(id, s) { localStorage.setItem(PREFIX + id, s); }
  function clearAll() {
    window.CHAPTER_QUIZZES.forEach(function (q) { localStorage.removeItem(PREFIX + q.id); });
  }

  window.recordAnswer = function (id, correct) {
    setStatus(id, correct ? 'correct' : 'wrong');
    renderWidget();
  };

  window.checkQuiz = function (id) {
    var data = (window.QUIZ_DATA || {})[id] || {};
    var selected = document.querySelector('input[name="' + id + '"]:checked');
    var feedback = document.getElementById(id + '_feedback');
    if (!feedback) return;

    if (!selected) {
      feedback.className = 'quiz-feedback warning';
      feedback.style.display = 'block';
      feedback.innerHTML = '⚠️ <strong>Please select an answer first.</strong>';
      return;
    }

    var isCorrect = selected.value === 'correct';
    window.recordAnswer(id, isCorrect);

    var msg = data[selected.value] || '';
    var header = isCorrect
      ? '<strong>✅ Correct!</strong><br/><br/>'
      : '<strong>❌ Not quite.</strong><br/><br/>';
    feedback.className = 'quiz-feedback ' + (isCorrect ? 'correct' : 'incorrect');
    feedback.style.display = 'block';
    feedback.innerHTML = header + msg;
  };

  function buildWidget() {
    var div = document.createElement('div');
    div.className = 'phaser-progress';
    div.id = 'phaser-progress';
    div.innerHTML = ''
      + '<button class="phaser-progress-toggle" onclick="togglePhaserProgress()">'
      +   '<span>Progress: <span class="phaser-progress-count" id="phaser-progress-count">0 / 0</span></span>'
      +   '<span id="phaser-progress-chevron">▾</span>'
      + '</button>'
      + '<div class="phaser-progress-body" id="phaser-progress-body" style="display:none;">'
      +   '<div class="phaser-progress-title" id="phaser-progress-title"></div>'
      +   '<div class="phaser-progress-bar"><div class="phaser-progress-bar-inner" id="phaser-progress-bar-inner"></div></div>'
      +   '<div class="phaser-progress-list" id="phaser-progress-list"></div>'
      +   '<button class="progress-reset" onclick="resetPhaserProgress()">Reset progress</button>'
      + '</div>';
    document.body.appendChild(div);
  }

  window.togglePhaserProgress = function () {
    var body = document.getElementById('phaser-progress-body');
    var chev = document.getElementById('phaser-progress-chevron');
    var opening = body.style.display === 'none';
    body.style.display = opening ? 'block' : 'none';
    chev.textContent  = opening ? '▴' : '▾';
  };

  window.resetPhaserProgress = function () {
    if (!confirm('Reset all quiz progress on this page?')) return;
    clearAll();
    window.CHAPTER_QUIZZES.forEach(function (q) {
      var fb = document.getElementById(q.id + '_feedback');
      if (fb) { fb.style.display = 'none'; fb.innerHTML = ''; }
      document.querySelectorAll('input[name="' + q.id + '"]').forEach(function (r) { r.checked = false; });
    });
    renderWidget();
  };

  function renderWidget() {
    var quizzes = window.CHAPTER_QUIZZES;
    var title = window.CHAPTER_TITLE || '';
    var answered = 0, correct = 0, html = '';
    quizzes.forEach(function (q) {
      var s = getStatus(q.id);
      if (s) answered++;
      if (s === 'correct') correct++;
      var iconClass = 'unanswered', icon = '–';
      if (s === 'correct')  { iconClass = 'correct';   icon = '✓'; }
      if (s === 'wrong')    { iconClass = 'incorrect'; icon = '✗'; }
      var name = q.anchor
        ? '<a href="#' + q.anchor + '">' + q.name + '</a>'
        : q.name;
      html += '<div class="progress-item">'
           +  '<span class="progress-item-icon ' + iconClass + '">' + icon + '</span>'
           +  '<span class="progress-item-name">' + name + '</span>'
           + '</div>';
    });
    var total = quizzes.length;
    var pct = total ? Math.round(correct / total * 100) : 0;

    document.getElementById('phaser-progress-count').textContent = correct + ' / ' + total;
    document.getElementById('phaser-progress-bar-inner').style.width = pct + '%';
    document.getElementById('phaser-progress-title').textContent = title;
    document.getElementById('phaser-progress-list').innerHTML = html;
  }

  function init() { buildWidget(); renderWidget(); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
